name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 تحميل المشروع
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🟢 Node (مهم لـ Capacitor 8)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 📦 تثبيت الحزم
      - name: Install dependencies
        run: npm install

      # ☕ Java 21 (حل خطأ invalid source release: 21)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 🔄 مزامنة Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 🧱 بناء APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 📦 رفع APK كـ Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
